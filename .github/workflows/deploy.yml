name: Deploy to EC2

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 프로젝트 디렉토리 준비
            cd /home/ubuntu/project || git clone https://github.com/your-repo/project.git /home/ubuntu/project
            cd /home/ubuntu/project

            # 최신 코드 가져오기
            git pull origin main

            # .env 파일 생성
            echo "${{ secrets.GATEWAY_ENV }}" > gateway/.env
            echo "${{ secrets.CHAT_ENV }}" > chat/.env
            echo "${{ secrets.GAME_ENV }}" > game/.env

            # 컨테이너 빌드 & 실행
            docker compose build
            docker compose up -d
