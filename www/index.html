<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>SAMPLE GAME</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #222;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      /* 로그인 폼 */
      .login-form {
        width: 640px;
        display: flex;
        justify-content: flex-start;
        gap: 8px;
        margin: 16px 0;
      }

      .login-form input,
      .login-form button {
        padding: 8px;
        font-size: 14px;
        border: none;
        border-radius: 4px;
      }

      .login-form input {
        flex: 1;
      }

      .login-form button {
        background-color: #555;
        color: #fff;
        cursor: pointer;
      }
      .login-form button:hover {
        background-color: #777;
      }

      /* 메인 레이아웃 */
      .main-container {
        display: flex;
        flex-direction: column; /* 세로 배치 */
        gap: 16px;
        width: 100%;
        max-width: 800px;
        flex: 1;
        padding: 16px;
        box-sizing: border-box;
      }

      /* 게임 영역 */
      .game-container {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #444;
        border-radius: 6px;
        width: 100%;
        height: 400px;
      }

      .game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* 사용자 목록 */
      .user-list-container {
        background: #333;
        border-radius: 6px;
        padding: 10px;
        box-sizing: border-box;
      }

      .user-list-container h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
      }

      #user-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 120px;
        overflow-y: auto;
      }

      #user-list li {
        padding: 4px 0;
        border-bottom: 1px solid #444;
      }

      /* 채팅 영역 */
      .chat-container {
        background: #333;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        padding: 10px;
        box-sizing: border-box;
      }

      .chat-container h3 {
        margin: 0 0 8px 0;
      }

      .chat-section {
        margin-bottom: 8px;
      }

      .chat-section h4 {
        margin: 4px 0;
        font-size: 14px;
        color: #ccc;
      }

      .chat-box {
        height: 100px;
        background: #111;
        overflow-y: auto;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }

      /* 채팅 메시지 스타일 */
      .my-message {
        text-align: left;
        color: #4caf50;
      }
      .other-message {
        text-align: left;
        color: #fff;
      }
      .system-message {
        text-align: left;
        color: #aaa;
        font-style: italic;
      }
      .admin-message {
        text-align: left;
        color: #ff9800;
        font-weight: bold;
      }
      .chat-input-row {
        display: flex;
        gap: 8px;
      }
      #chat-scope {
        padding: 6px;
        border-radius: 4px;
        border: none;
        background: #555;
        color: #fff;
      }
      #chat-input {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 4px;
      }
      #chat-send {
        padding: 8px 12px;
        background-color: #555;
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
      }
      #chat-send:hover {
        background-color: #777;
      }
      .logo {
        font-size: 32px;
        font-weight: bold;
        text-align: center;
        margin: 24px 0 12px 0;
        color: #fff;
      }
    </style>
  </head>

    </div>
