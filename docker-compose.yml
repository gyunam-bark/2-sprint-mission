  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sprint11
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

